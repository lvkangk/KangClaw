<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KangClaw</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=__CACHE_BUST__">
    <script src="/vendor/marked.min.js"></script>
</head>
<body>
    <div class="grain-overlay"></div>
    <div id="app">
        <aside id="sidebar">
            <div class="brand">
                <img class="brand-logo" src="/logo.png" alt="KangClaw">
                <button id="sidebar-toggle" class="sidebar-toggle" title="收起侧栏">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <button id="nav-chat" class="sidebar-nav-item active" title="聊天">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 3h12v8H5l-3 3V3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                </svg>
                <span>聊天</span>
            </button>
            <button id="nav-model" class="sidebar-nav-item" title="模型">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M8 1.5L2 5v6l6 3.5L14 11V5L8 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                    <path d="M2 5l6 3.5L14 5M8 8.5V15" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                </svg>
                <span>模型</span>
            </button>
            <button id="nav-channels" class="sidebar-nav-item" title="消息频道">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                </svg>
                <span>消息频道</span>
            </button>
            <button id="nav-skills" class="sidebar-nav-item" title="技能">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M9 1L4 9h4l-1 6 5-8H8l1-6z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                </svg>
                <span>技能</span>
            </button>
            <button id="nav-cron" class="sidebar-nav-item" title="定时任务">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/>
                    <path d="M8 4v4l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>定时任务</span>
            </button>
            <button id="nav-heartbeat" class="sidebar-nav-item" title="心跳巡检">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M1 8h2.5l1.5-3 2 6 2-4 1.5 1H15" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>心跳巡检</span>
            </button>
            <button id="nav-settings" class="sidebar-nav-item" title="其他配置">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.3"/>
                    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                </svg>
                <span>其他配置</span>
            </button>
            <div class="sidebar-footer">
                <button id="restart-gateway" class="sidebar-nav-item danger" title="重启网关">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 8a6 6 0 0110.47-4M14 8a6 6 0 01-10.47 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                        <path d="M13 1v3.5h-3.5M3 15v-3.5h3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>重启网关</span>
                </button>
                <div id="status-indicator" class="sidebar-version">
                    <span class="sidebar-version__label">版本</span>
                    <span class="sidebar-version__text" id="version-label">-</span>
                    <span class="sidebar-version__status status-dot"></span>
                </div>
            </div>
        </aside>
        <main>
            <div id="topbar" class="topbar">
                <div class="topbar__spacer"></div>
                <div class="theme-switcher">
                    <button class="theme-btn" data-theme="light" title="浅色">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="3.2" stroke="currentColor" stroke-width="1.3"/><path d="M7.5 1v2M7.5 12v2M1 7.5h2M12 7.5h2M3.4 3.4l1.4 1.4M10.2 10.2l1.4 1.4M3.4 11.6l1.4-1.4M10.2 4.8l1.4-1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                    </button>
                    <button class="theme-btn" data-theme="dark" title="深色">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M13 8.5a5.5 5.5 0 01-7-7A5.5 5.5 0 1013 8.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
                    </button>
                    <button class="theme-btn" data-theme="system" title="跟随系统">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="2" width="12" height="8.5" rx="1.2" stroke="currentColor" stroke-width="1.3"/><path d="M5.5 13h4M7.5 10.5V13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                    </button>
                </div>
            </div>
            <div id="restart-banner" class="restart-banner hidden">
                <span>配置已更新，重启网关后生效</span>
                <button id="banner-restart">立即重启</button>
                <button id="banner-dismiss" aria-label="关闭">&times;</button>
            </div>
            <div id="chat-view">
                <div id="messages">
                    <div class="welcome">
                        <img class="welcome-logo" src="/logo.png" alt="KangClaw">
                        <p class="welcome-subtitle">你的智能AI助手</p>
                        <div class="welcome-hints">
                            <div class="welcome-hint">
                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 3h12v8H5l-3 3V3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
                                <span>随时和我聊天，我会记住你说过的话</span>
                            </div>
                            <div class="welcome-hint">
                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M9 1L4 9h4l-1 6 5-8H8l1-6z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
                                <span>安装技能扩展我的能力</span>
                            </div>
                            <div class="welcome-hint">
                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 4v4l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                <span>设置定时任务，让我自动帮你做事</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="input-area">
                    <div id="attachment-preview"></div>
                    <div class="input-wrapper">
                        <div class="input-top-row">
                            <textarea id="input" placeholder="说点什么..." rows="1"></textarea>
                        </div>
                        <div class="input-bottom-row">
                            <div class="input-actions-left">
                                <button id="attach" aria-label="上传附件" title="上传附件">
                                    <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
                                        <path d="M15.5 9.5l-6.2 6.2a4.2 4.2 0 01-6-6l6.2-6.2a2.8 2.8 0 014 4L7.3 13.7a1.4 1.4 0 01-2-2l5.5-5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="input-actions-right">
                                <button id="new-chat" title="新建对话">
                                    <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
                                        <path d="M2 3h12v8H5l-3 3V3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                                        <path d="M6 7h4M8 5v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                    </svg>
                                </button>
                                <button id="send" aria-label="Send">
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                        <path d="M8 2L2.5 12l5.5-2.5L13.5 12L8 2z" fill="currentColor"/>
                                        <path d="M8 11V7" stroke="var(--bg-deep)" stroke-width="1" stroke-linecap="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="file-input" multiple accept="image/*,.pdf,.txt,.csv,.json,.md,.py,.js,.ts,.html,.css,.zip,.tar,.gz,.rar,.7z" hidden>
                </div>
            </div>
            <div id="config-page" class="config-page hidden" data-page="channels">
                <div class="config-page-header">
                    <h2>消息频道</h2>
                    <p>配置各频道的连接参数</p>
                </div>
                <div id="config-page-body"></div>
            </div>
            <div id="model-page" class="config-page hidden" data-page="model">
                <div class="config-page-header model-page-header">
                    <div>
                        <h2>模型配置</h2>
                        <p>配置 LLM 模型参数，激活一个作为当前使用模型</p>
                    </div>
                    <button id="model-add-btn" class="model-add-btn">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                        <span>添加模型</span>
                    </button>
                </div>
                <div id="model-page-body"></div>
            </div>
            <div id="skills-page" class="config-page hidden" data-page="skills">
                <div class="config-page-header" style="display:flex;align-items:center;justify-content:space-between;gap:16px">
                    <div>
                        <h2>技能管理</h2>
                        <p class="config-page-desc">查看和编辑你安装的技能</p>
                    </div>
                    <div class="skill-hubs">
                        <span class="skill-hubs__label">技能社区<span class="config-tooltip-icon" data-tip="去技能社区搜索你喜欢的技能，下载zip包后丢给你的AI助手，让他帮你安装这个技能~">?</span>：</span>
                        <a class="skill-hub-chip" href="https://skillhub.tencent.com/" target="_blank" rel="noopener">
                            <svg class="skill-hub-chip__icon" width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M9 1L4 9h4l-1 6 5-8H8l1-6z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
                            <span class="skill-hub-chip__name">SkillHub</span>
                            <svg class="skill-hub-chip__arrow" width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </a>
                        <a class="skill-hub-chip" href="https://cn.clawhub-mirror.com/" target="_blank" rel="noopener">
                            <svg class="skill-hub-chip__icon" width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M9 1L4 9h4l-1 6 5-8H8l1-6z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
                            <span class="skill-hub-chip__name">ClawHub-CN</span>
                            <svg class="skill-hub-chip__arrow" width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </a>
                        <a class="skill-hub-chip" href="https://clawhub.ai/" target="_blank" rel="noopener">
                            <svg class="skill-hub-chip__icon" width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M9 1L4 9h4l-1 6 5-8H8l1-6z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
                            <span class="skill-hub-chip__name">ClawHub</span>
                            <svg class="skill-hub-chip__arrow" width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </a>
                    </div>
                </div>
                <div id="skills-page-body"></div>
            </div>
            <div id="cron-page" class="config-page hidden" data-page="cron">
                <div class="config-page-header">
                    <h2>定时任务</h2>
                    <p class="config-page-desc">查看和管理已创建的定时任务</p>
                </div>
                <div id="cron-page-body"></div>
            </div>
            <div id="heartbeat-page" class="config-page hidden" data-page="heartbeat">
                <div class="config-page-header">
                    <h2>心跳巡检</h2>
                    <p class="config-page-desc">定期读取巡检清单并自动执行</p>
                </div>
                <div id="heartbeat-page-body"></div>
            </div>
            <div id="settings-page" class="config-page hidden" data-page="settings">
                <div class="config-page-header">
                    <h2>其他配置</h2>
                    <p class="config-page-desc">Agent 行为相关设置</p>
                </div>
                <div id="settings-page-body"></div>
            </div>
        </main>
    </div>
    <script src="/app.js?v=__CACHE_BUST__"></script>
</body>
</html>
